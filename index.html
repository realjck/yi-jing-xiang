<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="theme-color" content="#0c0a08">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Yijing - Book of Changes companion app</title>
  <meta name="description" content="This app is designed to accompany your physical tosses: use your own coins to perform the ritual, then enter the results to unlock the corresponding I Ching texts.">

  <!-- Open Graph -->
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://yijing.pxly.fr">
  <meta property="og:title"       content="Yijing - Book of Changes companion app">
  <meta property="og:description" content="This app is designed to accompany your physical tosses: use your own coins to perform the ritual, then enter the results to unlock the corresponding I Ching texts.">
  <meta property="og:image"       content="https://yijing.pxly.fr/assets/images/011.jpg">

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:url"         content="https://yijing.pxly.fr">
  <meta name="twitter:title"       content="Yijing - Book of Changes companion app">
  <meta name="twitter:description" content="This app is designed to accompany your physical tosses: use your own coins to perform the ritual, then enter the results to unlock the corresponding I Ching texts.">
  <meta name="twitter:image"       content="https://yijing.pxly.fr/assets/images/011.jpg">
  <link rel="shortcut icon" sizes="192x192" href="./assets/images/favicon.png">
  <link rel="icon" type="image/x-icon" href="./assets/images/favicon.ico">
  <link href="./assets/css/style.css" rel="stylesheet">
  <link rel="manifest" href="./manifest.json">
</head>
<body>

<!-- ── Shared header ── -->
<header class="hdr">
  <div class="hdr-left">
    <button class="hdr-home hidden" id="bt-home" aria-label="Home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 10.5L12 3l9 7.5V21a1 1 0 01-1 1H15v-5h-6v5H4a1 1 0 01-1-1V10.5z"/>
      </svg>
    </button>
  </div>
  <div class="hdr-right">
    <button class="hdr-btn" id="bt-settings" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
      </svg>
    </button>
    <button class="hdr-btn" id="bt-info" aria-label="Info">i</button>
    <button class="hdr-btn" id="bt-theme" aria-label="Theme">&#9790;</button>
  </div>
</header>

<div id="app">

  <!-- ── Screens ── -->
  <div id="screens">

    <!-- SCREEN 0 — HOME -->
    <div class="screen active" id="s-home">
      <div class="home-body">
        <div class="home-chinese">易经</div>
        <div class="home-latin">Yi Jing</div>
        <img class="home-logo" src="./assets/images/yijingxiang-logo.png" alt="Yi Jing Xiang logo">
        <div class="home-sub" id="baseline"></div>
        <button class="btn-start" id="bt-start"></button>
      </div>
    </div>

    <!-- SCREEN 1 — INSTRUCTIONS -->
    <div class="screen" id="s-inst">
      <div class="inst-body">
        <div class="inst-title">&#26131;&#32463;</div>
        <div class="sep"></div>
        <div class="inst-text" id="consigne-1"></div>
        <div>
          <div class="inst-coins-label" id="inst-coins-label"></div>
          <div class="inst-coins" id="inst-coins"></div>
        </div>
        <div class="inst-note" id="inst-note"></div>
      </div>
      <div class="bottom-nav">
        <button class="btn-action" id="bt-inst-back"></button>
        <button class="btn-action primary" id="bt-inst-start"></button>
      </div>
    </div>

    <!-- SCREEN 2 — CASTING -->
    <div class="screen" id="s-cast">
      <div class="cast-progress">
        <div class="cast-progress-label" id="cast-label"></div>
        <div class="cast-dots" id="cast-dots"></div>
      </div>
      <div class="hex-area" id="hex-area"></div>
      <div class="coin-btns" id="coin-btns"></div>
      <div class="cast-bottom">
        <button class="btn-reset" id="bt-reset"></button>
      </div>
    </div>

    <!-- SCREEN 3 — RESULT -->
    <div class="screen" id="s-result">
      <div class="result-title-area">
        <div class="result-num" id="result-num"></div>
        <div class="result-zh" id="result-zh"></div>
      </div>
      <div class="result-card-wrap">
        <div class="result-card" id="result-card">
          <div class="result-card-upper">
            <img id="rc-upper-img" src="" alt="">
          </div>
          <div class="result-card-divider"></div>
          <div class="result-card-lower">
            <img id="rc-lower-img" src="" alt="">
          </div>
          <div class="card-hex-overlay" id="card-overlay"></div>
          <div class="card-label" id="card-label"></div>
        </div>
      </div>
      <div class="result-nav">
        <button class="nav-arr disabled" id="arr-prev">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <button class="btn-reset" id="bt-new-cast-result"></button>
        <button class="nav-arr" id="arr-next">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>

    <!-- SCREEN 4 — ORACLE -->
    <div class="screen" id="s-oracle">
      <div id="oracle-content"></div>
      <div class="bottom-nav">
        <button class="btn-action" id="bt-oracle-back"></button>
        <button class="btn-action primary" id="bt-new-cast-oracle"></button>
      </div>
    </div>

  </div><!-- /#screens -->

  <!-- ── Modal info ── -->
  <div class="modal-overlay" id="modal-info">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title" id="modal-title"></div>
      <div class="sep"></div>
      <div class="modal-body" id="modal-body"></div>
      <button class="modal-close" id="bt-modal-close"></button>
    </div>
  </div>

  <!-- ── Modal settings ── -->
  <div class="modal-overlay modal-centered" id="modal-settings">
    <div class="modal-sheet modal-settings-sheet">
      <div class="modal-title" id="modal-settings-title"></div>
      <div class="sep"></div>
      <div class="settings-row">
        <span class="settings-label" id="settings-lang-label"></span>
        <div class="settings-opts">
          <button class="settings-opt settings-lang-opt" id="settings-lang-fr"></button>
          <button class="settings-opt settings-lang-opt" id="settings-lang-en"></button>
        </div>
      </div>
      <div class="settings-row">
        <span class="settings-label" id="settings-sound-label"></span>
        <div class="settings-opts">
          <button class="settings-opt settings-sound-opt" id="settings-sound-on"></button>
          <button class="settings-opt settings-sound-opt" id="settings-sound-off"></button>
        </div>
      </div>
      <button class="modal-close" id="bt-settings-close"></button>
    </div>
  </div>

</div><!-- /#app -->

<script src="./assets/libs/marked/marked.min.js"></script>
<script src="./assets/data/ui-texts.js"></script>
<script src="./assets/data/hexagrams-texts.js"></script>
<script src="./assets/app/app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js?' + Date.now());
  }
</script>
</body>
</html>
